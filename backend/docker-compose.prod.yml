services:
  api:
    image: youstream-api:latest
    ports:
      - "3000:3000"
    env_file:
      - .env.production
    environment:
      - STORAGE_ROOT=/app/storage
    volumes:
      - /home/ec2-user/storage:/app/storage
    restart: unless-stopped

  torrent-worker:
    image: youstream-worker:latest
    command: ["node", "dist/apps/torrent-worker/torrent-worker/src/main.js"]
    env_file:
      - .env.production
    environment:
      - STORAGE_ROOT=/app/storage
    volumes:
      - /home/ec2-user/storage:/app/storage
    restart: unless-stopped

  transcoder-worker:
    image: youstream-worker:latest
    command: ["node", "dist/apps/transcoder-worker/transcoder-worker/src/main.js"]
    env_file:
      - .env.production
    environment:
      - STORAGE_ROOT=/app/storage
      - TRANSCODE_MAX_CONCURRENT=1
    volumes:
      - /home/ec2-user/storage:/app/storage
    restart: unless-stopped

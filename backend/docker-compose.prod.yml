services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "3000:3000"
    env_file:
      - .env.production
    environment:
      - STORAGE_ROOT=/app/storage
    volumes:
      - storage:/app/storage
    restart: unless-stopped

  torrent-worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    command: ["node", "dist/apps/torrent-worker/torrent-worker/src/main.js"]
    env_file:
      - .env.production
    environment:
      - STORAGE_ROOT=/app/storage
    volumes:
      - storage:/app/storage
    restart: unless-stopped

  transcoder-worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    command: ["node", "dist/apps/transcoder-worker/transcoder-worker/src/main.js"]
    env_file:
      - .env.production
    environment:
      - STORAGE_ROOT=/app/storage
      - TRANSCODE_MAX_CONCURRENT=1
    volumes:
      - storage:/app/storage
    restart: unless-stopped

volumes:
  storage:
